{% set name = "trubar" %}
{% set version = "0.3.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/trubar-{{ version }}.tar.gz
  sha256: 6db6c0bb1b849c9194bbe1a21f37759a2df622bb0a66fd5d7d81acd0222f3491

build:
  entry_points:
    - trubar = trubar.__main__:main
  skip: True  # [py<38 or s390x]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools
    - wheel
    - pip
  run:
    - python
    - libcst
    - pyyaml

test:
  imports:
    - trubar
  commands:
    - pip check
    - trubar --help
  requires:
    - pip
    - python

about:
  home: https://github.com/janezd/trubar
  summary: Utility for translation of Python sources
  license: MIT
  license_family: MIT
  license_file: LICENSE
  description: |
    Trubar is a utility for translation of Python sources. It is designed to be
    used as a preprocessor for Python code that is to be translated to another
    language.
  dev_url: https://github.com/janezd/trubar
  doc_url: https://github.com/janezd/trubar/tree/master/docs
extra:
  recipe-maintainers:
    - janezd
